<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0F1117;
    --surface: #181B25;
    --surface2: #1F2333;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #F0F2F8;
    --muted: #8B91A8;
    --accent: #6C63FF;
    --accent2: #FF6B6B;
    --green: #4ADE80;
    --amber: #FBBF24;
    --teal: #2DD4BF;
    --pink: #F472B6;
    --blue: #60A5FA;
    --orange: #FB923C;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ===== HERO ===== */
  .hero {
    padding: 64px 24px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(108,99,255,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(108,99,255,0.35);
    background: rgba(108,99,255,0.1);
    padding: 5px 14px;
    border-radius: 99px;
    margin-bottom: 20px;
  }
  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 6vw, 64px);
    font-weight: 800;
    line-height: 1.05;
    color: var(--text);
    margin-bottom: 16px;
  }
  .hero h1 span { color: var(--accent); }
  .hero-sub {
    color: var(--muted);
    font-size: 16px;
    max-width: 520px;
    margin: 0 auto 40px;
  }
  .stats-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }
  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 8px 18px;
    font-size: 13px;
    color: var(--muted);
  }
  .stat-pill strong { color: var(--text); font-weight: 600; }

  /* ===== SEARCH & FILTERS ===== */
  .controls {
    max-width: 900px;
    margin: 0 auto 40px;
    padding: 0 24px;
  }
  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .search-wrap svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }
  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 13px 16px 13px 44px;
    font-size: 15px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: var(--accent); }

  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label { font-size: 12px; color: var(--muted); font-weight: 500; margin-right: 4px; }
  .chip {
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--border2); color: var(--text); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ===== MAIN LAYOUT ===== */
  .main { max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; }

  /* ===== COMPANY SECTION ===== */
  .company-section {
    margin-bottom: 48px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .company-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo-wrap {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .logo-wrap img {
    width: 36px;
    height: 36px;
    object-fit: contain;
  }
  .logo-initials {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
  }
  .company-info { flex: 1; min-width: 0; }
  .company-name {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  .company-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .q-count-badge {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 99px;
    flex-shrink: 0;
  }

  /* ===== QUESTION GRID ===== */
  .q-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    transition: border-color 0.15s, transform 0.15s;
    position: relative;
  }
  .q-card:hover {
    border-color: var(--border2);
    transform: translateY(-2px);
  }
  .q-card-top {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 6px;
    letter-spacing: 0.02em;
  }
  .tag-type {
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .q-text {
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.55;
  }

  /* ===== DIVIDER ===== */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 56px 0 40px;
  }
  .section-divider-line { flex: 1; height: 1px; background: var(--border); }
  .section-divider-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ===== EMPTY STATE ===== */
  .empty {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty h3 { font-size: 17px; color: var(--text); margin-bottom: 6px; }

  /* ===== FOOTER ===== */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .q-grid { grid-template-columns: 1fr; }
    .hero h1 { font-size: 32px; }
  }
</style>
</head>

const COMPANY_ORDER = ["Nile","Intelliwings","Meridian Solutions","FLAM","Scopely","Optimus (SET)","AgenticAI MCQ Bank","Miscellaneous"];
let activeFilter = "All";

function logoHTML(co) {
  const meta = COMPANY_META[co] || { initials: co[0], color:"#8B91A8" };
  if (meta.logo) {
    return `<img src="${meta.logo}" alt="${co} logo" onerror="this.style.display='none';this.nextSibling.style.display='flex';" />
            <span class="logo-initials" style="display:none;color:${meta.color}">${meta.initials}</span>`;
  }
  return `<span class="logo-initials" style="color:${meta.color}">${meta.initials}</span>`;
}

function buildStats() {
  const row = document.getElementById("stats-row");
  const companies = COMPANY_ORDER.filter(c => c !== "Miscellaneous");
  row.innerHTML = `
    <span class="stat-pill"><strong>${ALL_QUESTIONS.length}</strong> total questions</span>
    <span class="stat-pill"><strong>${companies.length}</strong> named companies</span>
    <span class="stat-pill"><strong>${ALL_QUESTIONS.filter(q=>q.company==="Miscellaneous").length}</strong> advanced questions</span>
  `;
}

function buildChips() {
  const wrap = document.getElementById("chips");
  wrap.innerHTML = "";
  ["All", ...COMPANY_ORDER].forEach(co => {
    const ch = document.createElement("span");
    ch.className = "chip" + (activeFilter === co ? " active" : "");
    ch.textContent = co === "All" ? "All" : co;
    ch.onclick = () => { activeFilter = co; render(); };
    wrap.appendChild(ch);
  });
}

function render() {
  buildChips();
  const q = document.getElementById("search").value.toLowerCase().trim();
  const out = document.getElementById("main-output");
  out.innerHTML = "";

  let totalShown = 0;

  COMPANY_ORDER.forEach((co, idx) => {
    const meta = COMPANY_META[co] || {};
    if (activeFilter !== "All" && activeFilter !== co) return;

    const items = ALL_QUESTIONS.filter(item => {
      if (item.company !== co) return false;
      if (!q) return true;
      return item.q.toLowerCase().includes(q) || item.tag.toLowerCase().includes(q) || item.type.toLowerCase().includes(q);
    });
    if (!items.length) return;
    totalShown += items.length;

    // Add divider before Misc
    if (co === "Miscellaneous" && activeFilter === "All") {
      const div = document.createElement("div");
      div.className = "section-divider";
      div.innerHTML = `<div class="section-divider-line"></div><span class="section-divider-label">Miscellaneous &amp; Advanced Questions</span><div class="section-divider-line"></div>`;
      out.appendChild(div);
    }

    const sec = document.createElement("div");
    sec.className = "company-section";
    sec.style.animationDelay = `${idx * 0.04}s`;

    const badge = meta.badge || { bg:"rgba(139,145,168,0.15)", color:"#8B91A8" };
    sec.innerHTML = `
      <div class="company-header">
        <div class="logo-wrap">${logoHTML(co)}</div>
        <div class="company-info">
          <div class="company-name">${co}</div>
          <div class="company-meta">${meta.desc || ""}</div>
        </div>
        <span class="q-count-badge" style="background:${badge.bg};color:${badge.color};border:1px solid ${badge.color}33">
          ${items.length} question${items.length > 1 ? "s" : ""}
        </span>
      </div>
      <div class="q-grid" id="grid-${idx}"></div>
    `;
    out.appendChild(sec);

    const grid = sec.querySelector(`#grid-${idx}`);
    items.forEach(item => {
      const tc = TAG_COLORS[item.tag] || { bg:"rgba(139,145,168,0.12)", color:"#8B91A8" };
      const card = document.createElement("div");
      card.className = "q-card";
      card.innerHTML = `
        <div class="q-card-top">
          <span class="tag" style="background:${tc.bg};color:${tc.color}">${item.tag}</span>
          <span class="tag tag-type">${item.type}</span>
        </div>
        <p class="q-text">${item.q}</p>
      `;
      grid.appendChild(card);
    });
  });

  if (!totalShown) {
    out.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>No questions found</h3><p>Try a different keyword or clear the search.</p></div>`;
  }
}

buildStats();
render();
</script>
